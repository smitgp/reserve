# Library Booking Schedule
# Simple YAML configuration for automatic library bookings
#
# Each booking will execute 2 days before the target date at the configured booking window time
# Example booking:
#   - targetDate: "2026-02-25"
#     start: "09:00"
#     end: "17:00"

"bookings":
  - "targetDate": "2026-02-20"
    "start": "09:00"
    "end": "17:00"
