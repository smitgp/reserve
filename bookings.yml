# Library Booking Schedule
# Simple YAML configuration for automatic library bookings
#
# Each booking will execute 2 days before the target date at 18:01 Netherlands time
# Example: 2026-02-17 booking will execute on 2026-02-15 at 18:01

bookings:
  - targetDate: 2026-02-17
    start: 09:00
    end: 09:30
  - targetDate: 2026-02-19
    start: 09:00
    end: 17:00
  - targetDate: 2026-02-20
    start: 09:00
    end: 17:00
