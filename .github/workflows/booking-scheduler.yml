name: Library Booking Scheduler

on:
  schedule:
    # Fire at 15:00 CET/CEST — leaves ~5 hours to sleep until 20:00 within GitHub's 6h limit.
    - cron: '0 14 * * *'   # 15:00 CET  (winter, UTC+1)
    - cron: '0 13 * * *'   # 15:00 CEST (summer, UTC+2)

  # Trigger immediate booking attempt when changes are pushed
  push:
    branches: [ main ]
    paths:
      - 'bookings.yml'
      - 'booking-scheduler.mjs'
      - '.github/workflows/booking-scheduler.yml'

  workflow_dispatch:
    inputs:
      force_date:
        description: 'Force booking for specific date (YYYY-MM-DD)'
        required: false
        type: string
      dry_run:
        description: 'Dry run - check what would be booked'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-and-book:
    runs-on: ubuntu-latest
    # Must cover sleep from ~15:00 until ~20:05 plus setup/teardown (~10 min)
    timeout-minutes: 360

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create .env file
      env:
        EMAIL: ${{ secrets.EMAIL }}
        LOCATION: ${{ secrets.LOCATION }}
        TYPE: ${{ secrets.TYPE }}
        BASE_EMAIL: ${{ secrets.BASE_EMAIL }}
        ENGINE_BODY: ${{ secrets.ENGINE_BODY }}
      run: |
        cat > .env << EOF
        EMAIL=${{ secrets.EMAIL }}
        LOCATION=${{ secrets.LOCATION }}
        TYPE=${{ secrets.TYPE }}
        BASE_EMAIL=${{ secrets.BASE_EMAIL }}
        ENGINE_BODY=${{ secrets.ENGINE_BODY }}
        EOF

    # ── Scheduled runs: try 18:00, 19:00 and 20:00 in sequence ─────────────────
    # Each step sleeps until its target time then runs the scheduler.
    # On success the scheduler removes the booking from bookings.yml on disk,
    # so later steps find nothing to do and exit quickly.
    # continue-on-error ensures a crash in one window doesn't skip the others.

    - name: 🕕 Try booking window 18:00 NL
      if: github.event_name == 'schedule'
      continue-on-error: true
      env:
        BOOKING_WINDOW_HOUR: '18'
        BOOKING_WINDOW_MINUTE: '00'
        FORCE_DATE: ${{ github.event.inputs.force_date }}
        DRY_RUN: ${{ github.event.inputs.dry_run }}
      run: |
        TARGET_EPOCH=$(TZ="Europe/Amsterdam" date -d "today 18:00:00" +%s)
        SLEEP_SECS=$(( TARGET_EPOCH - $(date +%s) ))
        if [ "$SLEEP_SECS" -gt 0 ]; then
          echo "⏳ Sleeping ~$(( SLEEP_SECS / 60 )) min until 18:00 Amsterdam..."
          sleep "$SLEEP_SECS"
        fi
        echo "⏰ Amsterdam: $(TZ="Europe/Amsterdam" date '+%H:%M:%S') — running 18:00 window"
        node booking-scheduler.mjs

    - name: 🕖 Try booking window 19:00 NL
      if: github.event_name == 'schedule'
      continue-on-error: true
      env:
        BOOKING_WINDOW_HOUR: '19'
        BOOKING_WINDOW_MINUTE: '00'
        FORCE_DATE: ${{ github.event.inputs.force_date }}
        DRY_RUN: ${{ github.event.inputs.dry_run }}
      run: |
        TARGET_EPOCH=$(TZ="Europe/Amsterdam" date -d "today 19:00:00" +%s)
        SLEEP_SECS=$(( TARGET_EPOCH - $(date +%s) ))
        if [ "$SLEEP_SECS" -gt 0 ]; then
          echo "⏳ Sleeping ~$(( SLEEP_SECS / 60 )) min until 19:00 Amsterdam..."
          sleep "$SLEEP_SECS"
        fi
        echo "⏰ Amsterdam: $(TZ="Europe/Amsterdam" date '+%H:%M:%S') — running 19:00 window"
        node booking-scheduler.mjs

    - name: 🕗 Try booking window 20:00 NL
      if: github.event_name == 'schedule'
      continue-on-error: true
      env:
        BOOKING_WINDOW_HOUR: '20'
        BOOKING_WINDOW_MINUTE: '00'
        FORCE_DATE: ${{ github.event.inputs.force_date }}
        DRY_RUN: ${{ github.event.inputs.dry_run }}
      run: |
        TARGET_EPOCH=$(TZ="Europe/Amsterdam" date -d "today 20:00:00" +%s)
        SLEEP_SECS=$(( TARGET_EPOCH - $(date +%s) ))
        if [ "$SLEEP_SECS" -gt 0 ]; then
          echo "⏳ Sleeping ~$(( SLEEP_SECS / 60 )) min until 20:00 Amsterdam..."
          sleep "$SLEEP_SECS"
        fi
        echo "⏰ Amsterdam: $(TZ="Europe/Amsterdam" date '+%H:%M:%S') — running 20:00 window"
        node booking-scheduler.mjs

    # ── Push / manual dispatch: run immediately ─────────────────────────────────
    - name: 🔍 Check and book (push or manual trigger)
      if: github.event_name != 'schedule'
      env:
        FORCE_DATE: ${{ github.event.inputs.force_date }}
        DRY_RUN: ${{ github.event.inputs.dry_run }}
        BOOKING_WINDOW_HOUR: '18'
        BOOKING_WINDOW_MINUTE: '00'
      run: |
        echo "🔍 Running scheduler immediately (non-scheduled trigger)..."
        node booking-scheduler.mjs

    - name: Commit booking status updates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action - Scheduler"
        git add bookings.yml

        if git diff --staged --quiet; then
          echo "📭 No booking status changes to commit"
        else
          git commit -m "🤖 Update booking status after scheduler run

          🕐 Executed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          📅 For date: ${FORCE_DATE:-$(date -u '+%Y-%m-%d')}
          🔧 Mode: ${DRY_RUN:-live}"

          git push
          echo "✅ Booking status updates committed to repository"
        fi
